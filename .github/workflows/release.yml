name: Release Resume

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Convert README to PDF
        uses: docker://pandoc/latex:3.9
        with:
          args: >-
            --pdf-engine=xelatex
            -V geometry:margin=1in
            README.md -o Daniel_Reshad_Resume.pdf

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            Daniel_Reshad_Resume.pdf \
            --title "Resume ${{ github.ref_name }}" \
            --generate-notes
