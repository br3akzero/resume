name: Release Resume

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Convert README to PDF
        uses: docker://pandoc/latex:3.9
        with:
          args: >-
            --pdf-engine=xelatex
            -V geometry:margin=1in
            README.md -o Daniel_Reshad_Resume.pdf

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges "${PREV_TAG}..${CURRENT_TAG}")
          else
            LOG=$(git log --oneline --no-merges)
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            Daniel_Reshad_Resume.pdf \
            --title "Resume ${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.CHANGELOG }}"
